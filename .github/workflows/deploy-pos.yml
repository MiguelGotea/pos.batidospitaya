name: 🚀 Deploy POS - Batidos Pitaya

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
      
    - name: 🔑 Configurar SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}
        
    - name: 📤 Sincronizar archivos (rsync)
      run: |
        echo "🔄 Sincronizando archivos POS (v13.1)..."
        
        rsync -avz \
          --delete \
          --exclude='.git/' \
          --exclude='.github/' \
          --exclude='.gitignore' \
          --exclude='.agent/' \
          --exclude='.scripts/' \
          --exclude='uploads/' \
          --exclude='modulos/*/uploads/' \
          -e "ssh -o StrictHostKeyChecking=no -p 65002" \
          ./ \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH_POS }}/
          
    - name: 🔧 Configurar permisos (v13.1)
      run: |
        echo "🔧 Configurando permisos en el servidor..."
        
        ssh -o StrictHostKeyChecking=no -p 65002 ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'EOF'
          cd ${{ secrets.HOSTINGER_PATH_POS }}
          
          # Directorios a 755
          find . -type d -exec chmod 755 {} \;
          
          # Archivos a 644
          find . -type f -exec chmod 644 {} \;
          
          # Uploads a 777 (si existen carpetas de módulos)
          if [ -d "modulos" ]; then
            find modulos -name "uploads" -type d -exec chmod 777 {} \;
          fi
          
          echo "✅ Permisos actualizados."
        EOF
        
    - name: ✅ Verificar deploy
      run: |
        echo "✅ Deploy completado para pos.batidospitaya.com"
        echo "🌐 Sitio: https://pos.batidospitaya.com"
